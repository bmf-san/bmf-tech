name: Broken Link Check

on:
  pull_request:
    branches: [main]
  schedule:
    # weekly Monday 00:00 UTC; catches link rot on already-merged content
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install gohan
        run: make install-gohan

      - name: Build site
        run: make build

      - name: Run lychee on built site
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}/public
            --accept 200,206,301,302,304,400,401,402,403,429,500,503,999
            --timeout 30
            --max-retries 3
            --exclude '^https?://bmf-tech\.com'
            --exclude '^https?://(www\.)?linkedin\.com'
            'public/**/*.html'
          fail: true
