name: Lint Content

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/ja/posts/**'
      - 'content/en/posts/**'
      - '.cspell.json'
      - '.cspell-words.txt'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install textlint dependencies
        run: make install-lint

      - name: Lint changed posts
        run: make lint-content-diff

      - name: Spell-check English posts
        run: npm run spell:en
