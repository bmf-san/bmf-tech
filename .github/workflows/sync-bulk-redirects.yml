name: Sync Bulk Redirects to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - bulk-redirects.txt
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Build cfredirects
        run: make cfredirects-build

      - name: Sync bulk redirects to Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./bin/cfredirects
