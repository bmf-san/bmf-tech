name: Sync Bulk Redirects to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - bulk-redirects.txt
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync bulk redirects to Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 .github/scripts/sync_bulk_redirects.py
