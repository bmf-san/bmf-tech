name: Translation Parity

on:
  pull_request:
    branches: [main]
    paths:
      - "content/ja/posts/**"
      - "content/en/posts/**"
      - "scripts/check-translation-parity.sh"
      - ".github/workflows/parity.yml"

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check en/ja translation_key parity
        run: bash scripts/check-translation-parity.sh
