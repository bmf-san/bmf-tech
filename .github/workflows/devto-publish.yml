name: Publish new article to dev.to

on:
  push:
    branches: [main]
    paths:
      - "content/en/posts/**.md"
  workflow_dispatch:
    inputs:
      mode:
        description: "diff: publish only files added in the last commit (default); all: publish every article not yet in posted.json"
        required: false
        default: "diff"
        type: choice
        options:
          - diff
          - all

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit posted.json back

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need parent commit to detect new files

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Build devto tool
        run: cd tools/devto && go mod tidy && go build -o ../../bin/devto .

      - name: Check API key
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
        run: |
          if [[ -z "${DEV_TO_API_KEY}" ]]; then
            echo "::error::DEV_TO_API_KEY secret is not set. Please add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "DEV_TO_API_KEY is configured."

      - name: Publish articles
        env:
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY }}
          MODE: ${{ github.event.inputs.mode || 'diff' }}
        run: |
          if [[ "${MODE}" == "all" ]]; then
            echo "Mode: all — publishing every article not yet in posted.json"
            ./bin/devto \
              --api-key="$DEV_TO_API_KEY" \
              --all \
              --state=tools/devto/posted.json
          else
            echo "Mode: diff — detecting files added in the last commit"
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/en/posts/*.md' | tr '\n' ' ')
            echo "Detected files: ${NEW_FILES}"
            if [[ -z "${NEW_FILES}" ]]; then
              echo "No new articles detected. Skipping."
              exit 0
            fi
            for f in ${NEW_FILES}; do
              echo "Posting: $f"
              ./bin/devto \
                --api-key="$DEV_TO_API_KEY" \
                --file="$f" \
                --state=tools/devto/posted.json
            done
          fi

      - name: Commit updated posted.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/devto/posted.json
          git diff --cached --quiet || git commit -m "chore: update devto posted.json [skip ci]"
          git push
