version: 1
rules:
  # プログラミング言語・フレームワーク
  - expected: Go
    patterns:
      - Golang
      - golang
  - expected: JavaScript
    patterns:
      - Javascript
      - javascript
  - expected: TypeScript
    patterns:
      - Typescript
      - typescript
  - expected: GitHub
    patterns:
      - Github
      - github
  - expected: GitHub Actions
    patterns:
      - Github Actions
      - github actions
  - expected: MySQL
    patterns:
      - Mysql
      - mysql
  - expected: PostgreSQL
    patterns:
      - Postgresql
      - postgresql
  - expected: Docker Compose
    patterns:
      - /docker[-\s]compose/i
  - expected: macOS
    patterns:
      - Mac OS
      - MacOS
      - Mac Os
      - macos
  - expected: Linux
    patterns:
      - linux
  - expected: CircleCI
    patterns:
      - Circleci
      - circleci
  - expected: Redis
    patterns:
      - redis
  - expected: Kubernetes
    patterns:
      - kubernetes
  - expected: React
    patterns:
      - react
  - expected: Node.js
    patterns:
      - Node.JS
      - NodeJS
      - nodejs
  # 表記ゆれ（日本語文脈）
  - expected: プルリクエスト
    patterns:
      - プルリク
  - expected: インターフェース
    patterns:
      - インタフェース
      - インターフェイス
