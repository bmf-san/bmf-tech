{{template "head" .}}
<body>
{{template "header" .}}
<main class="site-wrapper">
  <p class="section-heading">Tag</p>
  {{if .Articles}}
  <ul class="article-list">
    {{range .Articles}}
    <li>
      <span class="article-date">{{formatDate "2006-01-02" .FrontMatter.Date}}</span>
      <a href="{{.URL}}">{{.FrontMatter.Title}}</a>
    </li>
    {{end}}
  </ul>
  {{template "pagination" .}}
  {{else}}
  <p style="color:var(--muted);">No articles found.</p>
  {{end}}
</main>
{{template "footer" .}}
</body>
</html>
