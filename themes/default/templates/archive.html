{{template "head" .}}
<body class="bg-body">
{{template "header" .}}
<main class="container mx-auto px-4 py-10">
  <p class="text-xs text-secondary mb-6">Archive</p>
  {{if .Articles}}
  <div class="card mb-8">
    <div class="card-body">
      <ul class="article-list">
        {{range .Articles}}
        <li class="flex items-baseline gap-4 py-3 border-b border-slate-200">
          <span class="article-date text-xs text-secondary whitespace-nowrap">{{formatDate "2006-01-02" .FrontMatter.Date}}</span>
          {{if .Locale}}<span class="badge {{if eq .Locale "ja"}}badge-danger{{else}}badge-info{{end}}">{{.Locale}}</span>{{end}}
          <a href="{{.URL}}" class="font-medium">{{.FrontMatter.Title}}</a>
        </li>
        {{end}}
      </ul>
    </div>
  </div>
  {{else}}
  <p class="text-secondary mt-4">No articles found.</p>
  {{end}}
</main>
{{template "footer" .}}
</body>
</html>
