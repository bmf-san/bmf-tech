{{template "head" .}}
{{define "extra-style"}}<style>
.article-list { list-style: none; padding: 0; margin: 0; }
.article-list li { border-bottom: 1px solid var(--color-slate-200); }
.article-list li:last-child { border-bottom: none; }
</style>{{end}}
<body class="bg-body">
{{template "header" .}}
<main class="container mx-auto px-4 py-4">
  {{if .Articles}}
  <ul class="article-list">
    {{range .Articles}}
    <li class="flex items-baseline gap-4 py-3">
      <span class="text-xs text-secondary">{{formatDate "2006-01-02" .FrontMatter.Date}}</span>
      <a href="{{.URL}}" class="font-medium">{{.FrontMatter.Title}}</a>
    </li>
    {{end}}
  </ul>
  {{template "pagination" .}}
  {{else}}
  <p class="text-secondary">No articles found.</p>
  {{end}}
</main>
{{template "footer" .}}
</body>
</html>
