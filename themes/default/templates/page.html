{{define "extra-style"}}<style>
.prose table{border-collapse:collapse;font-size:var(--font-size-sm);margin-bottom:var(--spacing-4);width:100%}
.prose table th,.prose table td{border-top:1px solid var(--border-color);padding:var(--spacing-3);vertical-align:top}
.prose table thead th{border-bottom:2px solid var(--border-color);color:var(--text-secondary);font-size:var(--font-size-xs);font-weight:var(--font-weight-bold);letter-spacing:.05em;text-align:left;text-transform:uppercase;vertical-align:bottom}
</style>{{end}}
{{template "head" .}}
<body class="bg-body">
{{template "header" .}}
<main class="container mx-auto py-8 max-w-4xl">
  {{range .Articles}}
  <header class="mb-8">
    <ol class="breadcrumbs mb-4">
      <li class="breadcrumbs-item">
        <a href="/" class="breadcrumbs-link">Home</a>
        <span class="breadcrumbs-separator">/</span>
      </li>
      <li class="breadcrumbs-item active">
        <span class="breadcrumbs-link">{{.FrontMatter.Title}}</span>
      </li>
    </ol>
    <h1 class="text-4xl font-bold">{{.FrontMatter.Title}}</h1>
  </header>
  <article class="prose prose-full">
    {{.HTMLContent}}
  </article>
  {{end}}
</main>
{{template "footer" .}}
</body>
</html>
