{{template "head" .}}
{{define "htmllang"}}{{with index .Articles 0}}{{.Locale}}{{else}}{{$.Config.Site.Language}}{{end}}{{end}}
<body class="bg-body">
{{template "header" .}}
<main class="container mx-auto px-6 py-10 max-w-2xl">
  {{range .Articles}}
  <article>
    <header class="mb-8">
      <h1 class="text-2xl font-bold mb-2">{{.FrontMatter.Title}}</h1>
    </header>
    <div class="article-content">
      {{.HTMLContent}}
    </div>
  </article>
  {{end}}
</main>
{{template "footer" .}}
</body>
</html>
