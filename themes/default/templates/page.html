{{template "head" .}}
<body class="bg-body">
{{template "header" .}}
<main class="container mx-auto px-4 py-8 max-w-4xl">
  {{range .Articles}}
  <header class="mb-8">
    <h1 class="text-4xl font-bold">{{.FrontMatter.Title}}</h1>
  </header>
  <article class="prose prose-full">
    {{.HTMLContent}}
  </article>
  {{end}}
</main>
{{template "footer" .}}
</body>
</html>
