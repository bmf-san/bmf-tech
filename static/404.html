<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 Not Found | bmf-tech</title>
<meta name="description" content="The page you are looking for could not be found.">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bmf-san/sleyt@latest/docs/public/css/index.css">
<link rel="preload" href="https://cdn.jsdelivr.net/gh/bmf-san/sleyt@latest/docs/public/css/index.css" as="style">
</head>
<body class="bg-body">
<nav class="navbar">
  <a href="/" class="navbar-brand">bmf-tech</a>
</nav>
<main class="container mx-auto py-20 text-center">
  <h1 class="text-8xl font-bold mb-6 text-primary">404</h1>
  <div id="lang-en">
    <p class="text-2xl font-semibold mb-4">Page Not Found</p>
    <p class="text-secondary mb-10">The page you are looking for could not be found.</p>
    <div class="flex justify-center gap-4">
      <a href="/" class="btn btn-primary">Home</a>
    </div>
  </div>
  <div id="lang-ja" style="display:none">
    <p class="text-2xl font-semibold mb-4">ページが見つかりません</p>
    <p class="text-secondary mb-10">お探しのページは見つかりませんでした。</p>
    <div class="flex justify-center gap-4">
      <a href="/ja/" class="btn btn-primary">ホーム</a>
    </div>
  </div>
</main>
<footer class="bg-slate-900 text-slate-300 py-8 mt-16">
  <div class="container mx-auto text-center">
    <p class="text-sm">&copy; bmf-tech</p>
  </div>
</footer>
<script>
  if (navigator.language && navigator.language.startsWith('ja')) {
    document.documentElement.lang = 'ja';
    document.getElementById('lang-en').style.display = 'none';
    document.getElementById('lang-ja').style.display = '';
  }
</script>
</body>
</html>
