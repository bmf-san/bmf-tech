site:
  title: "bmf-tech"
  description: "bmf-san's personal tech blog"
  base_url: "https://bmf-tech.com"
  language: "en"
  github_repo: "https://github.com/bmf-san/bmf-tech"
  github_branch: "main"

build:
  content_dir: "content"
  output_dir: "public"
  assets_dir: "assets"
  parallelism: 4
  per_page: 20
  exclude_files: []

theme:
  name: "default"
  dir: "themes/default"
  params:
    author: "Kenta Takeuchi"
    github: "bmf-san"
    twitter: "bmf_san"
    linkedin: "bmf-san"
    zenn: "bmf_san"
    speaker_deck: "bmf_san"
    footer_text: "© 2026 Kenta Takeuchi"
    adsense_id: "ca-pub-5146230866088201"
    adsense_slot_article_top: "3773998823"
    adsense_slot_article_bottom: "2224967643"
    adsense_slot_list_mobile: "4950844549"
    ga_id: "G-784B55NW88"
    paypal: "bmfsan"
    amazon_wishlist: "7UKXW63I8NEK"

syntax_highlight:
  theme: "github"
  line_numbers: false

ogp:
  enabled: true
  background_color: "#ffffff"
  text_color: "#111111"
  logo_file: ""
  width: 1200
  height: 630

i18n:
  default_locale: "en"
  locales:
    - "en"
    - "ja"

plugins:
  amazon_books:
    enabled: true
    tag: "bmf035-22"
