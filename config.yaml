site:
  title: "bmf-tech"
  description: "bmf-san's personal tech blog"
  base_url: "https://bmf-tech.com"
  language: "en"
  github_repo: "https://github.com/bmf-san/bmf-tech"
  github_branch: "main"

build:
  content_dir: "content"
  output_dir: "public"
  assets_dir: "assets"
  parallelism: 4
  per_page: 20
  exclude_files: []

theme:
  name: "default"
  dir: "themes/default"
  params:
    # DNS移管が完了したらこの行を削除してリビルドする
    noindex: "true"
    author: "Kenta Takeuchi"
    github: "bmf-san"
    twitter: "bmf_san"
    linkedin: "bmf-san"
    zenn: "bmf_san"
    speaker_deck: "bmf_san"
    footer_text: "© 2026 Kenta Takeuchi"
    adsense_id: ""
    ga_id: ""

syntax_highlight:
  theme: "github"
  line_numbers: false

ogp:
  enabled: false

i18n:
  default_locale: "en"
  locales:
    - "en"
    - "ja"
